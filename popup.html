<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crisp</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      background: #0d0d1a;
      color: rgba(255,255,255,0.85);
      width: 240px;
      padding: 18px 16px 16px;
    }

    .popup-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .popup-logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #7c3aed, #5b21b6);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      box-shadow: 0 3px 10px rgba(109,40,217,0.4);
      flex-shrink: 0;
    }

    .popup-title {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(90deg, #fff 30%, rgba(139,92,246,0.8));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .popup-subtitle {
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      margin-top: 1px;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 10px 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
      margin-bottom: 12px;
      font-size: 12px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-dot.active {
      background: #4ade80;
      box-shadow: 0 0 6px #4ade80;
    }

    .status-dot.inactive {
      background: rgba(255,255,255,0.2);
    }

    .status-text {
      color: rgba(255,255,255,0.55);
      flex: 1;
    }

    .model-chip {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 20px;
      background: rgba(139,92,246,0.15);
      border: 1px solid rgba(139,92,246,0.3);
      color: rgba(139,92,246,0.9);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .settings-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid rgba(139,92,246,0.3);
      background: rgba(139,92,246,0.08);
      color: rgba(255,255,255,0.75);
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.18s ease;
      text-decoration: none;
    }

    .settings-btn:hover {
      background: rgba(139,92,246,0.18);
      border-color: rgba(139,92,246,0.5);
      color: #fff;
    }

    .settings-icon {
      font-size: 14px;
      opacity: 0.8;
    }

    .divider {
      height: 1px;
      background: rgba(255,255,255,0.06);
      margin: 12px 0;
    }

    .tip {
      font-size: 10.5px;
      color: rgba(255,255,255,0.22);
      text-align: center;
      line-height: 1.5;
    }

    .tip span {
      color: rgba(139,92,246,0.55);
    }
  </style>
</head>
<body>
  <div class="popup-header">
    <div class="popup-logo">✦</div>
    <div>
      <div class="popup-title">Crisp</div>
      <div class="popup-subtitle">Prompt optimizer</div>
    </div>
  </div>

  <div class="status-row" id="status-row">
    <div class="status-dot" id="status-dot"></div>
    <span class="status-text" id="status-text">Loading…</span>
    <span class="model-chip" id="model-chip" style="display:none"></span>
  </div>

  <button class="settings-btn" id="settings-btn">
    <span class="settings-icon">⚙</span>
    Open Settings
  </button>

  <div class="divider"></div>

  <div class="tip">Open <span>claude.ai</span> and look for the<br><span>✦ Crisp</span> button next to Send.</div>

  <script src="popup.js"></script>
</body>
</html>
