<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crisp — Settings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0d0d1a;
      color: rgba(255,255,255,0.85);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 48px 20px;
    }

    .container {
      width: 100%;
      max-width: 520px;
    }

    /* ── Logo / Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 36px;
    }

    .logo {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #7c3aed, #5b21b6);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      box-shadow: 0 4px 16px rgba(109, 40, 217, 0.4);
    }

    .header-text h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(90deg, #fff 40%, rgba(139,92,246,0.8));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-text p {
      font-size: 12.5px;
      color: rgba(255,255,255,0.38);
      margin-top: 2px;
    }

    /* ── Card ── */
    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 16px;
    }

    .card-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      margin-bottom: 18px;
    }

    /* ── Model Selector ── */
    .model-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .model-option {
      position: relative;
    }

    .model-option input[type="radio"] {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }

    .model-label {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 18px 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      cursor: pointer;
      transition: all 0.2s ease;
      user-select: none;
    }

    .model-label:hover {
      border-color: rgba(139,92,246,0.3);
      background: rgba(139,92,246,0.07);
    }

    .model-option input:checked + .model-label {
      border-color: rgba(139,92,246,0.6);
      background: rgba(139,92,246,0.12);
      box-shadow: 0 0 0 1px rgba(139,92,246,0.3) inset, 0 0 18px rgba(139,92,246,0.08);
    }

    .model-emoji {
      font-size: 26px;
      line-height: 1;
    }

    .model-name {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.8);
    }

    .model-sub {
      font-size: 10.5px;
      color: rgba(255,255,255,0.35);
    }

    .model-check {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.15);
      background: transparent;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }

    .model-option input:checked + .model-label .model-check {
      background: rgb(139,92,246);
      border-color: rgb(139,92,246);
      box-shadow: 0 0 8px rgba(139,92,246,0.5);
    }

    /* ── API Key Field ── */
    .field-group {
      margin-top: 0;
    }

    .field-label {
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,0.6);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .field-hint {
      font-size: 11px;
      color: rgba(255,255,255,0.3);
    }

    .input-wrap {
      position: relative;
    }

    .api-input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: rgba(255,255,255,0.88);
      font-family: 'Inter', monospace;
      font-size: 13px;
      padding: 11px 44px 11px 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      letter-spacing: 0.01em;
    }

    .api-input::placeholder {
      color: rgba(255,255,255,0.2);
    }

    .api-input:focus {
      border-color: rgba(139,92,246,0.5);
      box-shadow: 0 0 0 3px rgba(139,92,246,0.12);
    }

    .toggle-vis-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: rgba(255,255,255,0.3);
      cursor: pointer;
      padding: 4px;
      font-size: 14px;
      transition: color 0.15s;
      display: flex;
      align-items: center;
    }
    .toggle-vis-btn:hover { color: rgba(255,255,255,0.65); }

    /* ── Save Button ── */
    .save-btn {
      width: 100%;
      padding: 12px;
      border-radius: 11px;
      border: none;
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.18s ease;
      box-shadow: 0 4px 18px rgba(109,40,217,0.35);
      margin-top: 4px;
      letter-spacing: 0.01em;
    }

    .save-btn:hover {
      background: linear-gradient(135deg, #8b5cf6, #7c3aed);
      box-shadow: 0 6px 24px rgba(109,40,217,0.5);
      transform: translateY(-1px);
    }

    .save-btn:active { transform: translateY(0); }

    /* ── Status Banner ── */
    .status-banner {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      margin-top: 14px;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.25s ease, transform 0.25s ease;
      pointer-events: none;
    }

    .status-banner.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .status-banner.success {
      background: rgba(134,239,172,0.1);
      border: 1px solid rgba(134,239,172,0.2);
      color: rgb(134,239,172);
    }

    .status-banner.error {
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.2);
      color: rgb(248,113,113);
    }

    /* ── Footer ── */
    .footer {
      text-align: center;
      font-size: 11.5px;
      color: rgba(255,255,255,0.2);
      margin-top: 24px;
    }

    .footer a {
      color: rgba(139,92,246,0.6);
      text-decoration: none;
    }
    .footer a:hover { color: rgba(139,92,246,0.9); }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: rgba(255,255,255,0.06);
      margin: 22px 0;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="header">
      <div class="logo">✦</div>
      <div class="header-text">
        <h1>Crisp Settings</h1>
        <p>Configure your prompt optimizer</p>
      </div>
    </div>

    <!-- Model Selection -->
    <div class="card">
      <div class="card-title">Rewrite Model</div>
      <div class="model-grid">
        <div class="model-option">
          <input type="radio" name="model" id="model-gemini" value="gemini" />
          <label class="model-label" for="model-gemini">
            <span class="model-emoji">🔷</span>
            <span class="model-name">Gemini</span>
            <span class="model-sub">gemini-2.0-flash</span>
            <div class="model-check"></div>
          </label>
        </div>
        <div class="model-option">
          <input type="radio" name="model" id="model-groq" value="groq" />
          <label class="model-label" for="model-groq">
            <span class="model-emoji">⚡</span>
            <span class="model-name">Groq</span>
            <span class="model-sub">llama-3.3-70b-versatile</span>
            <div class="model-check"></div>
          </label>
        </div>
      </div>
    </div>

    <!-- API Key -->
    <div class="card">
      <div class="card-title">API Key</div>
      <div class="field-group">
        <div class="field-label">
          <span id="key-label">API Key</span>
          <span class="field-hint">Stored locally in your browser</span>
        </div>
        <div class="input-wrap">
          <input
            type="password"
            class="api-input"
            id="api-key-input"
            placeholder="Paste your API key here…"
            autocomplete="off"
            spellcheck="false"
          />
          <button class="toggle-vis-btn" id="toggle-vis" title="Show/hide key" aria-label="Toggle key visibility">
            👁
          </button>
        </div>
      </div>

      <div class="divider"></div>

      <button class="save-btn" id="save-btn">Save Settings</button>
      <div class="status-banner" id="status-banner"></div>
    </div>

    <div class="footer">
      Crisp v1.0 &nbsp;·&nbsp; Keys never leave your browser
    </div>

  </div>
  <script src="settings.js"></script>
</body>
</html>
